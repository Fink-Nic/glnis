block_names = ["smlmb", "smlmb+or", "nolmb+or", ]

[scripts.hpcomp_training_run]
n_training_steps = 1000
n_samples = 1_000_000
n_samples_after_training = 50_000_000
n_log = 50
n_plot_snapshot = 200
n_plot_loss = 10
plot_disc = true
