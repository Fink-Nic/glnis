run_name = "scalar@triangle@spherical"
output_dir = "scalar/3p1L"
templates = [
    "settings/templates/flow/size7",
    "settings/templates/madnis_bins/size1",
    "settings/templates/transformer/size4",
]

[graph]
momtrop_edge_weight = 0.83333333333
overwrite_lmb_heuristics = false

[gammaloop]
state = "scalar/3p1L/state"
integration_workspace = "scalar/3p1L/state/integration_workspace"
get_target_from_gammaloop = true
prefer_gammaloop_over_target = true

[layered_integrator]
integrator_type = "madnis"

[integrator.madnis]
batch_size = 2048

[layered_parameterisation.layer_0]
parameterisation_type = "spherical"
conformal_scale = 1.0

# [layered_parameterisation.layer_1]
# parameterisation_type = "mc_layer"
# subtype = "ose"
# ose_exponent = 1.0

[layered_integrand]
integrand_type = "gammaloop"
training_phase = "real"
n_cores = 32

[scripts.sampler_comp]
n_training_steps = 500
n_samples = 100000
n_samples_after_training = 1000000
