run_name = "gg_hhh@1L momentum space"
output_dir = "gg_hhh/1L/kspace"
templates = [
    "settings/templates/flow/size6",
    "settings/templates/madnis_bins/size1",
    "settings/templates/transformer/size2",
]

[graph]
overwrite_lmb_heuristics = true

[gammaloop]
state = "gg_hhh/1L/state"
integration_workspace = "gg_hhh/1L/state/integration_workspace"
result_file = "integration_result.json"
get_target_from_gammaloop = true

[integrator.madnis]
batch_size = 10000
learning_rate = 1e-3
use_scheduler = true
scheduler_type = "cosineannealing"

[layered_parameterisation.layer_0]
parameterisation_type = "spherical"
conformal_scale = 1.0

[layered_parameterisation.layer_1]
parameterisation_type = "mc_layer"
subtype = "ose"
ose_exponent = 1.0

[layered_integrand]
integrand_type = "gammaloop"
training_phase = "real"
n_cores = 32

[integrand.gammaloop]
momentum_space = true
sample_lmbs = false
sample_orientations = false

[scripts.sampler_comp]
n_training_steps = 1000
n_samples = 1000000
n_samples_after_training = 10000000

[[scripts.hyperparam_comparison.comparison]]
name = "bins"
blocks = [
        ["settings/templates/madnis_bins/size0"],
        ["settings/templates/madnis_bins/size1"],
        ["settings/templates/madnis_bins/size2"],
        ["settings/templates/madnis_bins/size3"],
        ["settings/templates/madnis_bins/size4"],
        ["settings/templates/madnis_bins/size5"],
    ]
block_names = [5, 10, 20, 50, 100, 200]

[[scripts.hyperparam_comparison.comparison]]
name = "flow network"
blocks = [
        ["settings/templates/flow/size0"],
        ["settings/templates/flow/size1"],
        ["settings/templates/flow/size2"],
        ["settings/templates/flow/size3"],
        ["settings/templates/flow/size4"],
        ["settings/templates/flow/size5"],
        ["settings/templates/flow/size6"],
        ["settings/templates/flow/size7"],
        ["settings/templates/flow/size8"],
        ["settings/templates/flow/size9"],
    ]
block_names = ["1_16", "1_64", "2_64", "2_128", "3_128", "3_256", "4_256", "4_512", "5_512", "5_1024"]

[[scripts.hyperparam_comparison.comparison]]
name = "transformer network"
blocks = [
        ["settings/templates/transformer/size0"],
        ["settings/templates/transformer/size1"],
        ["settings/templates/transformer/size2"],
        ["settings/templates/transformer/size3"],
        ["settings/templates/transformer/size4"],
        ["settings/templates/transformer/size5"],
    ]
block_names = ["1_1_1_32", "1_2_2_32", "2_2_2_64", "2_3_3_64", "4_3_3_64", "8_3_3_128"]

[[scripts.hyperparam_comparison.comparison]]
