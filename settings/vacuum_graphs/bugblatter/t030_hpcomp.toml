run_name = "bugblatter@t030"
output_dir = "bugblatter/t030"

templates = []

[integration_target]
n_points = 416000000
real_mean = -0.00000688441782011863
real_error = 0.0000000200846984630986

[integrator.madnis]
batch_size = 20000
learning_rate = 5e-4
scheduler_type = "cosineannealing"
discrete_model = "transformer"

[integrator.madnis.flow_kwargs]
uniform_latent = true
permutations = "log"
layers = 6
units = 1024
bins = 12
min_bin_width = 1e-3
min_bin_height = 5e-5
min_bin_derivative = 1e-5

[integrator.madnis.transformer_kwargs]
embedding_dim  = 128
feedforward_dim = 512
heads = 2
transformer_layers = 2
mlp_layers = 4
mlp_units = 512

[integrand.kaapo]
params = [0.190270777045349, 1.0, 33.0223348259205]

[layered_parameterisation.layer_0]
parameterisation_type = "rkaapo"
mu = [0.0, 1.0, 1.0, 0.0, 0.0, 1.0, 1.0, 1.0, 1.0]
a = 0.5
b = 1.0

[layered_parameterisation.layer_1]
parameterisation_type = "mc_layer"
subtype = "fermi"
ose_exponent = 6.0
fermi_exponent = 1.0


[scripts.sampler_comp]
n_training_steps = 2000 # Number of MadNIS training steps
nitn = 20 # Number of Vegas / Havana training steps (total training samples are equal to MadNIS)
n_samples = 1000000 # Number of samples to compute the snapshot with
n_samples_after_training = 100000000 # Number of samples drawn after the training to compute the final result
n_log = 20 # Training steps between callback of loss to console
n_plot_snapshot = 100 # Training steps between drawing n_samples samples for a snapshot
n_plot_loss = 5 # Training steps between plotting the loss
n_plot_disc = 5 # Training steps between plotting the discrete probabilities
plot_disc = true
take_prelim_snapshot = false

