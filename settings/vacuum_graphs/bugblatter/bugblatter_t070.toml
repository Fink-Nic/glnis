run_name = "bugblatter_t070"
templates = [
    "settings/vacuum_graphs/bugblatter/bugblatter",
    "settings/vacuum_graphs/bugblatter/bugblatter_tseries"
]

[integration_target]
n_points = 290000000
real_central_value = -0.00000624159212391007
real_error = 0.0000000179007098142485

[layered_integrand]
params = [0.46390258023886, 1.0, 13.5441913341902]

[scripts.slice_plots]
slice_dims_2d = [[4, 5]]

[scripts.training_prog]
n_training_steps = 2000
n_samples = 1000
nitn = 10
# Number of samples drawn after the training to compute the final result
n_samples_after_training = 290000000
# Training steps between callback of loss to console
n_log = 20
# Training steps between drawing n_samples samples to calculate the rel. std. (rsd)
# Will also output the statistics to console
n_plot_rsd = 100
# Training steps between plotting the loss
n_plot_loss = 10
