[model]
from_state = false

[integrator.madnis]
batch_size = 20000
learning_rate = 5e-4
scheduler_type = "cosineannealing"

[layered_integrand]
integrand_type = "kaapo"
path_to_example = "thermal_integrand_examples/bugblatterPQ"
use_prec = true
use_f128 = true
n_cores = 128

[integrand.kaapo.symbolica_integrand_kwargs]
rotation_seed = 42
stability_tolerance = 1e-5
stability_abs_tolerance = 1e-15
stability_abs_threshold = 1e-12
escalate_large_weight_multiplier = 0.9
escalate_small_momentum_multiplier = 1e-4
escalate_large_momentum_multiplier = 1e3
n_shots = 3
force_rebuild = false
sum_orientations = true
runtime_summation = false

[integrand.kaapo.symbolica_integrand_prec_kwargs]
prec = 200
n_shots = 1
escalate_large_weight_multiplier = -1.0
escalate_small_momentum_multiplier = -1.0
escalate_large_momentum_multiplier = -1.0
sum_orientations = true
runtime_summation = false

[scripts.sampler_comp]
n_training_steps = 1000 # Number of MadNIS training steps
nitn = 20 # Number of Vegas / Havana training steps (total training samples are equal to MadNIS)
n_samples = 1000000 # Number of samples to compute the snapshot with
n_samples_after_training = 10000000 # Number of samples drawn after the training to compute the final result
n_log = 20 # Training steps between callback of loss to console
n_plot_snapshot = 100 # Training steps between drawing n_samples samples for a snapshot
n_plot_loss = 2 # Training steps between plotting the loss
n_plot_disc = 2 # Training steps between plotting the discrete probabilities
plot_disc = true 

[integrand.kaapo]
params = [0.190270777045349, 1.0, 33.0223348259205]

