run_name = "cosine@single"
output_dir = "cosine/single"

templates = [
    "settings/test/base",
    "settings/templates/madnis_bins/size1",
    "settings/templates/flow/size5",
    "settings/templates/transformer/size3",
]

[integrator.madnis]
loss_type = "variance"

[layered_integrand]
integrand_type = "cosine"
strat_sgn = true

[integrand.cosine]
n_cosines = 1

[scripts.sampler_comp]
n_training_steps = 50
n_samples = 10000
n_samples_after_training = 20000
n_log = 5
n_plot_snapshot = 10
n_plot_loss = 1
plot_disc = true
n_plot_disc = 2
