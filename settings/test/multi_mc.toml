run_name = "test@multi_mc"
output_dir = "test/multi_mc"

templates = [
    "settings/test/base",
    "settings/test/mc",
    "settings/templates/madnis_bins/size0",
    "settings/templates/flow/size5",
    "settings/templates/transformer/size3",
]

[integrand.test]
sigma = [0.5, 1.0, 2.0]

[integrator.madnis]
loss_type = "variance"

[scripts.slice_plots]
EPS = 0.2
[scripts.slice_plots.plotting]
use_blue_green_red = false
low_high_ratio = 0.1
low_high_gap = 0.3
center = -3

[[scripts.slice_plots.slice]]
