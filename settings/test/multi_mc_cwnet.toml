run_name = "test@multi_mc_cwnet"
output_dir = "test/multi_mc_cwnet"

templates = [
    "settings/test/base",
    "settings/test/mc",
    "settings/templates/madnis_bins/size0",
    "settings/templates/flow/size5",
    "settings/templates/transformer/size3",
]

[layered_integrand]
strat_sgn = false
sum_channels = true

[integrand.test]
sigma = [0.5, 1.0, 2.0]

[integrator.madnis]
loss_type = "variance"
use_cwnet = true
uniform_channel_ratio = 0.1

[[scripts.slice_plots.slice]]
name = "re+"
from_max_wgt = "re+"
dirs = [0, 3]
grid = [
    {start = 0, stop = 2, num = 100},
    {start = 0, stop = 1, num = 150},
]
[[scripts.slice_plots.slice]]
name = "re+"
from_max_wgt = "re+"
dirs = [0]
grid = [
    {start = 0, stop = 1, num = 100},
]
