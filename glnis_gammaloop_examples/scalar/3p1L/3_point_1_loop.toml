commands = []

[cli_settings]
[cli_settings.state]
folder = "./glnis_gammaloop_examples/scalar/3p1L/state"
name = "scalar_triangle"

[[command_blocks]]
name = "generate"
commands = [
  "import model ./glnis_gammaloop_examples/models/scalars.json",
  "remove processes",
  "import graphs ./glnis_gammaloop_examples/dot_files/scalar_3_point_1_loop.dot",
  "generate",
  "save dot",
  "save state -o",
]
[[command_blocks]]
name = "integrate"
commands = [
  "set process kv integrator.n_start=1000000 integrator.n_max=10000000",
  """
  integrate  --n-cores 10 --target 9.75646e-5 0.0
    --restart
  """,
]

[default_runtime_settings.sampling]
graphs = "monte_carlo"
orientations = "summed"
lmb_multichanneling = false
lmb_channels = "summed"
coordinate_system = "tropical"

[cli_settings.global.generation.compile]
compilation_mode = "assembly"
optimization_level = "O1"
fast_math = true
unsafe_math = true
custom = []

[cli_settings.global.generation.tropical_subgraph_table]
panic_on_fail = true
disable_tropical_generation = false

[cli_settings.global.generation.evaluator]
iterative_orientation_optimization = false
store_atom = false
compile = true
summed = false
summed_function_map = true

# Disable thresholds with
# [cli_settings.global.generation.threshold_subtraction]
# enable_thresholds = false
# [default_runtime_settings.subtraction]
# disable_threshold_subtraction = true

# Otherwise leave them enabled with
[cli_settings.global.generation.threshold_subtraction]
enable_thresholds = true
# The option below specifies the generation of threshold for the kinematics supplied
check_esurface_at_generation = true

[cli_settings.global.n_cores]
feyngen = 10
generate = 10
compile = 10
integrate = 10

[default_runtime_settings.kinematics.externals]
type = "constant"

[default_runtime_settings.kinematics]
e_cm = 1.0

[default_runtime_settings.kinematics.externals.data]
momenta = [
    "dependent",
    [
        1.0,
        3.0,
        4.0,
        5.0,
    ],
    [
        -1.0,
        -6.0,
        -7.0,
        -8.0,
    ],
] 
helicities = [1, 1, 1]
